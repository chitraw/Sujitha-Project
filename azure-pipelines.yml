trigger:
- master

pool: test

steps:
- script: |
    node -v
    npm -v
  displayName: 'Check Node.js version'

- script: |
    npm config set registry https://registry.npmjs.org/
    npm config set strict-ssl false   # optional, only if errors persist
    npm install
    npm run build
  displayName: 'npm install and build'


# Copy build output (React apps usually build into "build" folder)
- task: CopyFiles@2
  inputs:
    SourceFolder: 'build'
    Contents: '**'
    TargetFolder: '$(Build.ArtifactStagingDirectory)'
  displayName: 'Copy build output to staging'

# Publish artifacts
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'
  displayName: 'Publish build artifacts'
